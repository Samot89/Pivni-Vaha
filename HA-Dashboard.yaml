type: vertical-stack
cards:
  - type: custom:mushroom-entity-card
    entity: sensor.pivni_vaha_celkova_hmotnost
    name: Obsah piva (kg)
    icon: mdi:keg
    icon_color: deep-orange
    tap_action: none
    secondary_info: state
  - type: custom:mushroom-entity-card
    entity: sensor.pivni_vaha_hmotnost_bez_offsetu_sudu
    name: Váha celková (kg)
    icon: mdi:keg
    icon_color: deep-white
    tap_action: none
    secondary_info: state
  - type: custom:mushroom-entity-card
    entity: sensor.pivni_vaha_pocet_piv
    name: Počet piv
    icon: mdi:beer
    icon_color: amber
    secondary_info: state
  - type: custom:mushroom-number-card
    entity: number.pivni_vaha_offset_sudu_kg
    name: Offset sudu (kg)
    icon: mdi:tune
    icon_color: teal
    fill_container: true
    primary_info: name
    secondary_info: state
    display_mode: slider
  - type: grid
    columns: 4
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: 10 L
        secondary: 8.0 kg
        icon: mdi:keg
        icon_color: green
        tap_action:
          action: call-service
          service: number.set_value
          target:
            entity_id: number.pivni_vaha_offset_sudu_kg
          data:
            value: 8
          perform_action: number.set_value
        color: green
        features_position: bottom
        entity: number.pivni_vaha_offset_sudu_kg
      - type: custom:mushroom-template-card
        primary: 15 L
        secondary: 10.0 kg
        icon: mdi:keg
        icon_color: green
        tap_action:
          action: call-service
          service: number.set_value
          target:
            entity_id: number.pivni_vaha_offset_sudu_kg
          data:
            value: 10
      - type: custom:mushroom-template-card
        primary: 30 L
        secondary: 12.5 kg
        icon: mdi:keg
        icon_color: green
        tap_action:
          action: call-service
          service: number.set_value
          target:
            entity_id: number.pivni_vaha_offset_sudu_kg
          data:
            value: 12.5
      - type: custom:mushroom-template-card
        primary: 50 L
        secondary: 14.0 kg
        icon: mdi:keg
        icon_color: green
        tap_action:
          action: call-service
          service: number.set_value
          target:
            entity_id: number.pivni_vaha_offset_sudu_kg
          data:
            value: 14
